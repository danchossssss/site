<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body>
    <script>
        const CORRECT_PASSWORD = 'YAEBALGITHUB';
        const STORAGE_KEY = 'github_secret_content';
        
        // Получаем путь и пароль из URL
        const url = new URL(window.location.href);
        const password = url.searchParams.get('password');
        const path = url.pathname;
        
        // Проверяем что это запрос к /raw
        if (path.includes('/raw')) {
            if (password === CORRECT_PASSWORD) {
                const content = localStorage.getItem(STORAGE_KEY) || '';
                
                // Создаем blob с типом text/plain
                const blob = new Blob([content], { type: 'text/plain; charset=utf-8' });
                const blobUrl = URL.createObjectURL(blob);
                
                // Заменяем содержимое страницы на ссылку для скачивания
                // и автоматически перенаправляем
                window.location.href = blobUrl;
            } else {
                document.body.textContent = 'Error: Invalid password';
            }
        }
    </script>
</body>
</html>
