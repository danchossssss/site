<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Editor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
        }
        h1 {
            color: #58a6ff;
            margin: 0 0 20px 0;
        }
        textarea {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            background: #238636;
            color: white;
            border: 1px solid #2ea043;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-right: 10px;
        }
        button:hover {
            background: #2ea043;
        }
        .hidden {
            display: none;
        }
        .message {
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }
        .success {
            background: #04260f;
            border: 1px solid #3fb950;
            color: #3fb950;
        }
        .error {
            background: #490202;
            border: 1px solid #f85149;
            color: #f85149;
        }
        #rawUrl {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 10px;
            margin-top: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
            color: #7ee787;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Редактор</h1>
        <textarea id="editor" placeholder="Введите текст..."></textarea>
        <button onclick="save()">💾 Сохранить</button>
        <div id="message"></div>
        <p style="margin-top: 20px; color: #8b949e;">Raw URL:</p>
        <div id="rawUrl">Загрузка...</div>
    </div>

    <script>
        const PASS = 'YAEBALGITHUB';
        const KEY = 'secret_content';

        document.getElementById('editor').value = localStorage.getItem(KEY) || '';
        updateRawUrl();

        function save() {
            const content = document.getElementById('editor').value;
            localStorage.setItem(KEY, content);
            updateRawUrl();
            showMessage('✅ Сохранено!', 'success');
        }

        function updateRawUrl() {
            const content = localStorage.getItem(KEY) || '';
            const encoded = btoa(unescape(encodeURIComponent(content)));
            const url = window.location.href.replace('index.html', '') + 'raw.html?p=' + PASS + '#' + encoded;
            document.getElementById('rawUrl').textContent = url;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.classList.remove('hidden');
            setTimeout(() => msg.classList.add('hidden'), 3000);
        }
    </script>
</body>
</html>
