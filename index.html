<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Editor</title>
    <style>
        body { background: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 40px; }
        textarea { width: 100%; height: 300px; background: #252526; color: #d4d4d4; border: 1px solid #3e3e3e; padding: 15px; font-family: monospace; font-size: 14px; }
        button { background: #0e639c; color: white; border: none; padding: 10px 20px; cursor: pointer; margin: 10px 5px; }
        #raw-link { background: #252526; padding: 10px; margin-top: 15px; word-break: break-all; color: #4ec9b0; font-size: 12px; }
    </style>
</head>
<body>
    <h2>Script Editor</h2>
    <textarea id="code" placeholder="Paste your script here..."></textarea>
    <br>
    <button onclick="save()">Save</button>
    <button onclick="copyLink()">Copy Raw Link</button>
    <p>Raw URL (use this in your script loader):</p>
    <div id="raw-link"></div>

    <script>
        const PASS = "YAEBALGITHUB";
        const KEY = "saved_script";
        
        document.getElementById('code').value = localStorage.getItem(KEY) || "";
        updateLink();
        
        function save() {
            localStorage.setItem(KEY, document.getElementById('code').value);
            updateLink();
            alert("Saved!");
        }
        
        function updateLink() {
            var code = localStorage.getItem(KEY) || "";
            var encoded = btoa(unescape(encodeURIComponent(code)));
            var link = location.href.replace("index.html","") + "raw.html?pass=" + PASS + "#" + encoded;
            document.getElementById('raw-link').textContent = link;
        }
        
        function copyLink() {
            updateLink();
            var link = document.getElementById('raw-link').textContent;
            navigator.clipboard.writeText(link);
            alert("Link copied!");
        }
    </script>
</body>
</html>
