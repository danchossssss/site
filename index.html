<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .hidden {
            display: none !important;
        }
        
        .login-container, .editor-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 30px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        
        h1 {
            color: #58a6ff;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        textarea {
            width: 100%;
            min-height: 400px;
            padding: 15px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 15px;
        }
        
        button {
            background: #238636;
            color: #ffffff;
            border: 1px solid #2ea043;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }
        
        button:hover {
            background: #2ea043;
        }
        
        .logout-btn {
            background: #21262d;
            border: 1px solid #30363d;
            margin-left: 10px;
        }
        
        .logout-btn:hover {
            background: #30363d;
        }
        
        .error {
            color: #f85149;
            margin-bottom: 15px;
            padding: 10px;
            background: #490202;
            border-radius: 6px;
            border: 1px solid #f85149;
        }
        
        .success {
            color: #3fb950;
            margin-bottom: 15px;
            padding: 10px;
            background: #04260f;
            border-radius: 6px;
            border: 1px solid #3fb950;
        }
        
        .info {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="loginForm" class="login-container">
        <h1>🔐 Введите пароль</h1>
        <input type="password" id="passwordInput" placeholder="Введите пароль...">
        <button onclick="checkPassword()">Войти</button>
        <div id="loginError" class="error hidden"></div>
    </div>
    
    <div id="editorForm" class="editor-container hidden">
        <h1>📝 Редактор кода</h1>
        <textarea id="codeEditor" placeholder="Введите ваш код или текст здесь..."></textarea>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button onclick="saveContent()">💾 Save</button>
            <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
        </div>
        <div id="saveMessage" class="hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
